<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AI Social Commerce Agent</title>
    <meta name="description" content="Your AI marketing employee — products in, social content out." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700;800&family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%23E63946'/%3E%3Ctext x='16' y='22' font-size='18' text-anchor='middle' fill='white' font-family='sans-serif' font-weight='bold'%3EA%3C/text%3E%3C/svg%3E" />
  </head>
  <body>
    <div id="app">
      <aside class="sidebar" id="sidebar">
        <div class="brand">
          <span class="brand-mark">A</span>
          <div class="brand-text">
            <strong>Social Commerce</strong>
            <small>AI Marketing Agent</small>
          </div>
        </div>
        <nav class="nav" id="nav"></nav>
        <div class="sidebar-footer">
          <button class="btn btn-ghost" id="themeToggle" title="Toggle theme">◐ Theme</button>
          <button class="btn btn-ghost" id="logoutBtn" title="Sign out" onclick="logout()">⎋ Sign out</button>
          <div class="health" id="healthPill"></div>
        </div>
      </aside>

      <main class="main">
        <header class="topbar">
          <button class="hamburger" id="hamburger" aria-label="Menu">☰</button>
          <h1 id="pageTitle">Dashboard</h1>
          <div class="topbar-actions">
            <button class="btn btn-primary" id="runNow">▶ Run now</button>
            <button class="btn btn-accent" id="addProduct">+ Add product</button>
          </div>
        </header>
        <section class="content" id="view"><div class="loading">Loading…</div></section>
      </main>
    </div>

    <div class="modal-backdrop" id="modalBackdrop" hidden>
      <div class="modal" id="modal" role="dialog" aria-modal="true"></div>
    </div>
    <div class="toasts" id="toasts"></div>

    <div class="auth-gate" id="authGate" hidden>
      <div class="auth-card">
        <div class="auth-mark">A</div>
        <h2>Sign in</h2>
        <p class="auth-sub">Enter your API token to access the dashboard.</p>
        <form id="authForm">
          <input type="password" id="authTokenInput" autocomplete="current-password" placeholder="API token" />
          <div class="auth-error" id="authError" hidden></div>
          <button class="btn btn-accent" type="submit">Sign in</button>
        </form>
        <p class="auth-hint">Set <code>API_TOKENS</code> on the server. Tokens are sent as a Bearer header.</p>
      </div>
    </div>

    <script type="module" src="./app.js"></script>
  </body>
</html>
